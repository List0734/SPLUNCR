[communication]
poll_rate_hz = 200
emergency_stop_timeout_ms = 1000

[communication.command]
listen_address = "0.0.0.0:9000"

[communication.telemetry]
target_address = "192.168.100.2:9001"
bind_address = "0.0.0.0:0"
rate_hz = 20

[vision.camera]
device = "/dev/video0"
width = 640
height = 480
framerate = 30

[vision.stream]
target_address = "192.168.100.2:9002"
bind_address = "0.0.0.0:0"

[propulsion]
loop_rate_hz = 100
default_max_force = { forward = 1.0, reverse = 0.7 }

# Corner thrusters, angled 45 degrees inward
[[propulsion.thrusters]]
id = 1
gpio_pin = 4
placement.position = [ 1.0,  1.0,  0.0]
placement.direction = [ 0.707, -0.707,  0.0]

[[propulsion.thrusters]]
id = 2
gpio_pin = 5
placement.position = [ 1.0, -1.0,  0.0]
placement.direction = [ 0.707,  0.707,  0.0]

[[propulsion.thrusters]]
id = 3
gpio_pin = 6
placement.position = [-1.0,  1.0,  0.0]
placement.direction = [-0.707, -0.707,  0.0]

[[propulsion.thrusters]]
id = 4
gpio_pin = 12
placement.position = [-1.0, -1.0,  0.0]
placement.direction = [-0.707,  0.707,  0.0]

# Vertical thrusters, 2 per side
[[propulsion.thrusters]]
id = 5
gpio_pin = 13
placement.position = [ 0.33,  1.0,  0.0]
placement.direction = [ 0.0,  0.0,  1.0]
bidirectional = true

[[propulsion.thrusters]]
id = 6
gpio_pin = 16
placement.position = [-0.33,  1.0,  0.0]
placement.direction = [ 0.0,  0.0,  1.0]
bidirectional = true

[[propulsion.thrusters]]
id = 7
gpio_pin = 17
placement.position = [ 0.33, -1.0,  0.0]
placement.direction = [ 0.0,  0.0,  1.0]
bidirectional = true

[[propulsion.thrusters]]
id = 8
gpio_pin = 18
placement.position = [-0.33, -1.0,  0.0]
placement.direction = [ 0.0,  0.0,  1.0]
bidirectional = true

[propulsion.regulator.velocity.linear]
surge = { kp = 1.0, ki = 0.0, kd = 0.1 }
sway  = { kp = 1.0, ki = 0.0, kd = 0.1 }
heave = { kp = 2.0, ki = 0.0, kd = 0.2 }

[propulsion.regulator.velocity.angular]
roll  = { kp = 0.5, ki = 0.0, kd = 0.05 }
pitch = { kp = 0.5, ki = 0.0, kd = 0.05 }
yaw   = { kp = 0.8, ki = 0.0, kd = 0.1 }

[propulsion.regulator.thruster.coast]
accel_rate = 3.0
decel_rate = 3.0

[sensor]
loop_rate_hz = 50

[sensor.imu]
calibration_samples = 200
calibration_delay_ms = 5

[sensor.estimator.attitude]
kp = 1.0
ki = 0.01
